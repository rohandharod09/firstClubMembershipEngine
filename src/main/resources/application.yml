spring:
  application:
    name: membership-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/firstclub_membership
    username: firstclub
    password: firstclub
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

membership:
  grace-period-days: 3
  idempotency-ttl-hours: 24
  scheduler:
    expiry-fixed-delay-ms: 300000
    renewal-fixed-delay-ms: 900000
    tier-reevaluation-cron: "0 0 2 * * *"
    downgrade-fixed-delay-ms: 3600000

logging:
  level:
    com.firstclub.membership: INFO
    org.hibernate.SQL: WARN
